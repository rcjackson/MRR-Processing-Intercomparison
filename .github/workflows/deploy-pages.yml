name: Deploy Jupyter Books to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Jupyter Book
        run: |
          python -m pip install --upgrade pip
          pip install jupyter-book

      - name: Build overview book
        run: jupyter-book build books/overview

      - name: Build processing book
        run: jupyter-book build notebooks

      - name: Assemble site
        run: |
          mkdir -p _site
          cp landing/index.html _site/index.html
          cp -r books/overview/_build/html _site/overview
          cp -r notebooks/_build/html _site/processing

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
